services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kairos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kairos
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://kairos:${POSTGRES_PASSWORD}@db:5432/kairos
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: development
      ALLOWED_ORIGINS: '["https://vps23933.cubepath.net","http://${SERVER_IP}:3000"]'
      EMAIL_PROVIDER: resend
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: onboarding@resend.dev
      FRONTEND_URL: https://vps23933.cubepath.net
      APP_NAME: Kairos
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      UPLOAD_DIR: /tmp/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://vps23933.cubepath.net/api/v1
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  pg_data:
  caddy_data:
  caddy_config:
